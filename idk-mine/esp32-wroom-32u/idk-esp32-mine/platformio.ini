[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs

lib_extra_dirs =
  ../../shared

lib_deps =
  bblanchon/ArduinoJson @ 7.1.0

build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DIDK_ENABLE_GUI=0

monitor_filters =
  esp32_exception_decoder
