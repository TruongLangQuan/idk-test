[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs

lib_extra_dirs =
  ../../shared

lib_deps =
  bblanchon/ArduinoJson @ 7.1.0
  bodmer/TFT_eSPI @ 2.5.43

build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DIDK_ENABLE_GUI=1
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DTOUCH_CS=33
  -DTFT_INVERSION_ON=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_GFXFF=1

monitor_filters =
  esp32_exception_decoder
