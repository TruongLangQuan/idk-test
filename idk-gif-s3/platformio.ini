[platformio]
default_envs = esp32s3_114tft

[env:esp32s3_114tft]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DUSER_SETUP_LOADED
  -DUSE_HSPI_PORT
  -DST7789_DRIVER
  -DTFT_WIDTH=135
  -DTFT_HEIGHT=240
  -DTFT_RGB_ORDER=TFT_BGR
  -DCGRAM_OFFSET
  -DTFT_INVERSION_ON
  -DTFT_MISO=-1
  -DTFT_MOSI=35
  -DTFT_SCLK=36
  -DTFT_CS=7
  -DTFT_DC=39
  -DTFT_RST=40
  -DTFT_BL=45
  -DTFT_BACKLIGHT_ON=1
  -DSPI_FREQUENCY=27000000
  -DSPI_READ_FREQUENCY=20000000
  -DLOAD_GLCD
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
